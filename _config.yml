# www — the studio portal, served at the apex domain.
#
# The portal is a RENDERER, not a second source of truth: every project,
# gnome, feed item, and status signal on it derives from machine-readable
# state fetched at build time (scripts/build-data.py). Nothing here maintains
# a project list by hand.
#
# The values below are the DETACHED-BUILD FALLBACK ONLY. A real build overlays
# `_config.studio.yml`, generated at build time from the control repo's
# platform.yml (branding, domain, analytics beacon) — the overlay wins, so the
# authoritative branding always comes from platform.yml, never from here.
title: bussetech software studio
description: "The studio portal: every project, every gnome, and the latest across the studio's sites."
lang: en
url: "https://bussetech.com" # overlaid from platform.yml domain at build
baseurl: ""

remote_theme: bussetech/theme@v0.11.0 # compact rail signup + signup_rail opt-out (fixes homepage double capture)
plugins:
  - jekyll-remote-theme

# Every post renders with the post layout — gnome-authored posts (standup,
# weekly cost notes) arrive without a `layout:` in their front matter, and
# without this default they shipped as bare HTML with no page shell
# (EPIC3-07 known issue #2).
defaults:
  - scope:
      type: posts
    values:
      layout: post

studio:
  # Fallback studio contract; _config.studio.yml (generated from platform.yml)
  # overrides logotype/org/domain/analytics_beacon on every real build.
  logotype: "bussetech | software studio"
  org: bussetech
  domain: bussetech.com
  visibility: public
  is_portal: true # the portal is the studio, not "a … project" of it
  theme_color: "#FFFFFF"
  analytics_beacon: "" # minted by the DNS steward into platform.yml; injected at build
  # Email capture (platform EPIC3-03, #98; ADR-0034). LIVE (canary). The form
  # POSTs straight to Buttondown; the provider holds the PII, this repo holds
  # only the aggregate count. Double opt-in + open-tracking-off are provider-side.
  signup:
    enabled: true
    # Site-wide right-rail capture (compact treatment, theme v0.11.0); the
    # homepage opts out (signup_rail: false) — it has its own inline block.
    rail: true
    rail_placement: "www-rail"
    action: "https://buttondown.com/api/emails/embed-subscribe/bussetech"
    email_field: email
    # Capture copy: gn_gtm_copywriter's www v2 draft, variant 1 (T3 lead),
    # run 28823211371 — platform docs/gtm/first-cycle/www-v2-homepage-copy.md.
    # Sysop review = the PR merge (GD-0007 rule 2).
    heading: "Every run in the ledger. Every engagement watchable."
    value_prop: "One human and a governed workforce of gnomes — every task logged, every change a PR, every decision on the record. Get studio updates in your inbox."
    button_label: "Subscribe"
    privacy_note: "We store only your email address, solely to send studio updates, under notice of Eszett, LLC — double opt-in, and you can unsubscribe with one click, anytime."
    hidden:
      embed: "1"
    placement_field: "metadata__placement"
  # Detached-build fallback; the generated overlay (_config.studio.yml) injects
  # the authoritative value from platform.yml branding.legal on real builds.
  legal:
    copyright: "© 2026 Eszett, LLC"
  # The honest footer line (EPIC3-07): the studio described exactly as it is.
  footer_note: "One human + a governed gnome workforce. Every claim on this site traces to a receipt."
  nav:
    - title: Home
      url: /
    - title: How it works
      url: /how-it-works/
    - title: Showcase
      url: /showcase/
    - title: Gnomes
      url: /gnomes/
    - title: The human
      url: /human/

markdown: kramdown
sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - scripts/
  - README.md
  - CLAUDE.md
