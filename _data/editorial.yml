# editorial.yml — the homepage's short editorial voice.
#
# Maintained by gn_portal_editor ("Gnome Portal Editor"), which reviews the
# aggregated project feeds daily and refreshes these blurbs via PR — it never
# pushes to main. Humans may edit too; the gnome treats the current content
# as prior art, not as something to clobber.
#
#   featured        name of a listed repo to feature on the homepage ("" = none)
#   featured_note   one or two sentences on why it's featured right now
#   week_note       "this week in the studio" — a few plain sentences, no hype
#   updated         ISO date of the last editorial pass

featured: "kdc"
featured_note: "KDC is the studio's flagship dataset — US data center projects tracked from announcements, permits, and construction as an open, source-cited record. It launched with 33 project-sites across seven states, a filterable status-coloured map with per-record locator pages, and a case study documenting how the dataset is built and kept current — a ledger entry for every run, every change a reviewed pull request. It is now in an unattended-reliability soak, with a re-verdict on how much of it runs without a hand on the wheel booked for 2026-07-19."
week_note: "The studio turned outward: the portal, a how-it-works page, and KDC's case study went live, each claim scoped to what a receipt can back. We then audited our own public numbers against their sources and shipped the fixes — the homepage record count, a stale cost figure, a couple of wording overclaims — because the receipt discipline we describe has to hold on our own pages first. Next up are the studio's first channel posts, held until a share-of-model-voice baseline is measured so progress is counted honestly from zero."
updated: "2026-07-08"
