# editorial.yml — the homepage's short editorial voice.
#
# Maintained by gn_portal_editor ("Gnome Portal Editor"), which reviews the
# aggregated project feeds daily and refreshes these blurbs via PR — it never
# pushes to main. Humans may edit too; the gnome treats the current content
# as prior art, not as something to clobber.
#
#   featured        name of a listed repo to feature on the homepage ("" = none)
#   featured_note   one or two sentences on why it's featured right now
#   week_note       "this week in the studio" — a few plain sentences, no hype
#   updated         ISO date of the last editorial pass

featured: "kdc"
featured_note: "KDC launched this week with a seed dataset of 33 project-sites across seven states, and its site now plots every tracked site on a filterable, status-coloured map."
week_note: "KDC joined the studio this week, tracking US data center projects — announcements, permits, construction — as an open dataset. Its first release covers 33 project-sites resolved from 183 source signals, and the site now has a browsable map with per-record locator pages. A case study published this week walks through how KDC is built and maintained, from an empty repository to a live, source-cited site, with each run receipted and each change a reviewed pull request. Elsewhere on the portal, it was a quiet week."
updated: "2026-07-07"