# editorial.yml — the homepage's short editorial voice.
#
# Maintained by gn_portal_editor ("Gnome Portal Editor"), which reviews the
# aggregated project feeds daily and refreshes these blurbs via PR — it never
# pushes to main. Humans may edit too; the gnome treats the current content
# as prior art, not as something to clobber.
#
#   featured        name of a listed repo to feature on the homepage ("" = none)
#   featured_note   one or two sentences on why it's featured right now
#   week_note       "this week in the studio" — a few plain sentences, no hype
#   updated         ISO date of the last editorial pass

featured: "genmurk"
featured_note: "GenMURK closed its first build epic this week. Ten working sessions and twenty merged pull requests turned an empty directory into a playable multiplayer text world, with movement, real authentication, a user-programmable softcode engine, and the persistent details, like mail and undo, that made the original MUSE lineage feel alive."
week_note: "Canonical Castles joined the studio: a source-cited dataset that answers how many castles exist per definition, not in general, prompted by a Hacker News debate over a map that gave a single contested number. GenMURK's first build epic also closed, taking its clean-room text-world rebuild from an empty directory to a playable game with movement, authentication, and a softcode engine players can program from inside it. KDC, menowise, backpacks, and Lemonade Stand remain live and stable."
updated: "2026-07-24"
